<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MandiSystem</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="max-w-4xl mx-auto mt-10">

        <h2 class="text-2xl font-bold text-blue-700 mb-6">
            Live Grain Bidding
        </h2>

        <div class="bg-white p-6 rounded shadow">

            <p><strong>Grain:</strong> Wheat</p>
            <p><strong>Farmer:</strong> Ravi Kumar</p>
            <p><strong>Quantity:</strong> 100 KG</p>

            <p class="mt-3 text-xl">
                Current Bid: <span class="text-green-600 font-bold">₹2300</span>
            </p>

            <input type="number" placeholder="Enter your bid" class="border p-2 w-full mt-4">

            <button class="bg-blue-600 text-white px-6 py-2 mt-3 rounded">
                Place Bid
            </button>

        </div>

    </div>

</body>

</html>
