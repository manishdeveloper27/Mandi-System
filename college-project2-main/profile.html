<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farmer Registration</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-green-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">

<h2 class="text-2xl font-bold text-center text-green-700 mb-6">
Farmer Registration
</h2>

<form id="farmerForm" class="space-y-4">

<input type="text" id="name" placeholder="Farmer Name"
class="w-full p-2 border rounded" required>

<input type="text" id="mobile" placeholder="Mobile Number"
class="w-full p-2 border rounded" required>

<input type="text" id="address" placeholder="Address"
class="w-full p-2 border rounded" required>

<input type="text" id="district" placeholder="District"
class="w-full p-2 border rounded" required>

<select id="crop" class="w-full p-2 border rounded">
<option value="">Select Crop</option>
<option>Wheat</option>
<option>Rice</option>
<option>Maize</option>
<option>Vegetables</option>
</select>

<input type="password" id="password" placeholder="Password"
class="w-full p-2 border rounded" required>

<button type="submit"
class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
Register
</button>

</form>

<p id="message" class="text-center text-green-700 mt-4"></p>

</div>

<script>

document.getElementById("farmerForm").addEventListener("submit", function(e){

e.preventDefault();

let farmer = {
name: document.getElementById("name").value,
mobile: document.getElementById("mobile").value,
address: document.getElementById("address").value,
district: document.getElementById("district").value,
crop: document.getElementById("crop").value,
password: document.getElementById("password").value
};

localStorage.setItem("farmerData", JSON.stringify(farmer));

document.getElementById("message").innerText =
"Farmer Registered Successfully!";

document.getElementById("farmerForm").reset();

});

</script>

</body>
</html>
